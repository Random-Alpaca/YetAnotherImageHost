# /etc/nginx/sites-available/image-hoster
#
# Replace IMAGE_HOST_DOMAIN with your domain (e.g. img.jxue.ca).
# TLS lines are filled in by certbot --nginx; the pre-TLS version is fine to
# install first, then run certbot.

upstream image_app {
    server 127.0.0.1:3000;
}

server {
    listen 80;
    listen [::]:80;
    server_name IMAGE_HOST_DOMAIN;

    # Keep this ABOVE the app's MAX_UPLOAD_BYTES (25 MB) so a max-size file
    # plus multipart overhead isn't rejected here — let multer enforce the
    # real per-file limit and return a clean JSON 413 instead of nginx HTML.
    # Uploads are one file per request, so this caps a single file, not a batch.
    client_max_body_size 30m;

    # --- Public images: served directly off disk, no app involvement ---------
    location /i/public/ {
        alias /srv/images/public/;
        # opaque ids => safe to cache hard
        expires 30d;
        add_header Cache-Control "public, immutable";
        # don't execute anything, just serve files
        autoindex off;
        try_files $uri =404;
    }

    # --- Internal location for X-Accel-Redirect -------------------------------
    # NOT reachable from the internet (the `internal` directive enforces this).
    # The app returns `X-Accel-Redirect: /internal/<year>/<id>.<ext>` and Nginx
    # serves the matching file from the PRIVATE root.
    location /internal/ {
        internal;
        alias /srv/images/private/;
    }

    # --- App server: auth, upload, and private-image authorization ------------
    location /api/ {
        proxy_pass http://image_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Private image requests go through the app for authorization. The app's
    # X-Accel-Redirect is honored automatically by Nginx for proxied responses.
    location /i/private/ {
        proxy_pass http://image_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # React SPA build (web/dist). History-mode fallback to index.html so client
    # routes like /admin resolve. API/image locations above take precedence.
    root /srv/app/web;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }
}
